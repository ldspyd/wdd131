<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Builder</title>
    <meta charset="UTF-8">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Budget Builder">

    <meta property="og:url" content="https://ldspyd.github.io/wdd131/final/budget.html">
    <meta property="og:image" content="social-preview-image.png">
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Budget Builder">

    <link rel="icon" href="favicon.ico">

</head>
<body>
    <header>
        <div id="headline" aria-label="Logo and title">
            <img id="logo" src="images/logo.png" alt="Site logo">
            <h1>Budget Builder</h1>
        </div>

        <hr>

        <nav>
            <a href="../index.html">Main</a>
        </nav>
    </header>

    <hr>

    <main>
        <div id="top">
            <section id="trend-area">
                <p>Average amount: </p>
                <p>Frequency: </p>
                <!-- <p>Most frequent category: </p> -->
            </section>
            <form id="receipt-form">
                <label for="category">Category</label> <input id="category" name="category" type="text" required>
                <label for="date">Date</label> <input id="date" name="date" type="date" required>
                <label for="amount">Amount</label> <input id="amount" name="amount" type="number" required>
                <button class="submit" type="submit">Submit Receipt</button>
            </form>
        </div>

        <div id="receipt-container">
            <!-- <div class="receipt">
                <h3>Category: </h3> <p>Grocery</p>
                <h3>Date: </h3> <p>2026-07-10</p>
                <h3>Amount: </h3> <p>$ 10</p>
            </div> -->
        </div>
    </main>

    <hr>

    <footer>

    </footer>
