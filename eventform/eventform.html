
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Ticket</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="eventform.css" />
  <script src="eventform.js" defer></script>
</head>
<body>
  <main class="wrapper">
    <h1>Event Form</h1>

    <form id="fsyForm">
      <div class="field">
        <label for="firstName">First Name</label>
        <input id="firstName" name="firstName" type="text" required />
      </div>

      <div class="field">
        <label for="lastName">Last Name</label>
        <input id="lastName" name="lastName" type="text" required />
      </div>

      <div class="field full">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />
      </div>

      <div class="field">
        <label for="travelRange">Type</label>
        <select
          id="travelRange"
          name="travelRange"
          aria-controls="notesContainer"
          required
        >
          <option value="none">Choose one</option>
          <option value="student">Student</option>
          <option value="guest">Guest</option>
        </select>
      </div>

      <div class="field">
        <label for="availableDate">Event Date</label>
        <input id="availableDate" name="availableDate" type="date" required />
      </div>

          <label><input type="checkbox" name="campus" value="San Diego State University - San Diego, California" /> San Diego State University - San Diego, California</label>
          <label><input type="checkbox" name="campus" value="University of Idaho - Moscow, Idaho" /> University of Idaho - Moscow, Idaho</label>

      <div id="notesContainer" class="field full" hidden>
        <label for="notes">Student I#</label>
        <input id="notes" name="notes" type="text" />
      </div>
      <div id="notesContainer2" class="field full" hidden>
        <label for="notes">Access Code</label>
        <input id="notes2" name="notes2" type="text" />
      </div>

      <button class="full" type="submit">Submit Preferences</button>
    </form>

    <section id="output" aria-live="polite"></section>
  </main>
