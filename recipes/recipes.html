<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">


    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipes">
    <meta property="og:description" content="Practice Flexbox with Flaticon">
    <meta property="og:url" content="https://ldspyd.github.io/wdd131/recipes/recipes.html">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Recipes">
    <meta name="twitter:description" content="Practice Flexbox with Flaticon">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    <link rel="stylesheet" href="recipes.css">
    <script src="recipes.js" defer></script>
    <title>Recipes</title>
</head>

<body>
    <header id="title-line">
        <img src="images/recipe-book.png" alt="recipe book logo">
        <h1>RECIPEBOOK</h1>
    </header>
    <section role="search" id="search-bar">
        <input type="search" id="search-input" placeholder="EX: Apple Crisp">
        <hr class="horizontal">
        <button id="search-button" aria-label="Submit search">
            <img src="images/search.svg" alt="search icon">
        </button>
        <!-- <img src="images/search.svg" alt="search icon"> -->
    </section>
    
    <hr>

    <div class="recipe-card">
        <img src="images/apple-crisp.jpg" alt="apple-crisp">

        <div>
            <button class="recipe-category">
                dessert
            </button>
            <h3 class="recipe-name">APPLE CRISP</h3>
            <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star-empty">☆</span>
            </span>
            <p id="recipe-description">This apple crisp is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.</p>
        </div>
    </div>

    <footer class="social">
        <div id="link">
            <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik -
                Flaticon</a>
        </div>
        <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
        <div id="icons">
            <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>
    </footer>




</body>

</html>
